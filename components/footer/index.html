<footer class="site-footer" id="siteFooter">

    <div class="container">

        <div class="footer-grid">

            <!-- ==================================================
                 EMPRESA
            =================================================== -->

            <section class="footer-company">

                <a
                    href="/"
                    class="footer-logo"
                    id="footerLogo">
                </a>

                <p
                    class="footer-slogan"
                    id="footerSlogan">
                </p>

                <p
                    class="footer-description"
                    id="footerDescription">
                </p>

            </section>

            <!-- ==================================================
                 MENÚ
            =================================================== -->

            <section class="footer-navigation">

                <h3>Navegación</h3>

                <ul
                    class="footer-menu"
                    id="footerMenu">
                </ul>

            </section>

            <!-- ==================================================
                 CONTACTO
            =================================================== -->

            <section class="footer-contact">

                <h3>Contacto</h3>

                <ul
                    class="footer-contact-list"
                    id="footerContact">
                </ul>

            </section>

            <!-- ==================================================
                 REDES / CTA
            =================================================== -->

            <section class="footer-social">

                <h3>Síguenos</h3>

                <div
                    class="footer-social-links"
                    id="footerSocial">
                </div>

                <div
                    class="footer-cta"
                    id="footerCTA">
                </div>

            </section>

        </div>

        <!-- ==================================================
             COPYRIGHT
        =================================================== -->

        <div class="footer-bottom">

            <p id="footerCopyright"></p>

        </div>

    </div>

</footer>
