<header class="site-header" id="siteHeader">

    <!-- Top Bar -->

    <div class="topbar">

        <div class="container d-flex justify-between align-center">

            <!-- Información de contacto -->
            <div
                class="topbar-contact d-flex align-center gap-4"
                id="topbarContact">
            </div>

            <!-- Redes sociales -->
            <div
                class="topbar-social d-flex align-center gap-3"
                id="topbarSocial">
            </div>

        </div>

    </div>

    <!-- Navegación -->

    <nav class="navbar">

        <div class="container d-flex justify-between align-center">

            <!-- Logo -->
            <a
                href="/"
                class="navbar-logo"
                id="navbarLogo">
            </a>

            <!-- Menú -->
            <ul
                class="navbar-menu"
                id="navbarMenu">
            </ul>

            <!-- Acciones -->
            <div
                class="navbar-actions d-flex align-center gap-3">

                <!-- Buscador -->
                <button
                    type="button"
                    class="search-toggle"
                    id="searchToggle"
                    aria-label="Buscar">

                    🔍

                </button>

                <!-- CTA -->
                <div id="navbarCTA"></div>

                <!-- Menú móvil -->
                <button
                    type="button"
                    class="menu-toggle"
                    id="menuToggle"
                    aria-label="Abrir menú"
                    aria-expanded="false"
                    aria-controls="mobileMenu">

                    ☰

                </button>

            </div>

        </div>

    </nav>

    <!-- Menú móvil -->

    <aside
        class="mobile-menu"
        id="mobileMenu">

        <nav>

            <ul
                class="mobile-menu-list"
                id="mobileMenuList">
            </ul>

        </nav>

    </aside>

    <!-- Overlay -->

    <div
        class="mobile-overlay"
        id="mobileOverlay">
    </div>

</header>
